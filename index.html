<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Трекер ваги та обʼємів</title>

  <style>
    :root{
      --bg: #0f1115;
      --card: #151925;
      --text: #eef2ff;
      --muted: rgba(238,242,255,.72);
      --border: rgba(238,242,255,.10);
      --shadow: 0 10px 30px rgba(0,0,0,.35);

      --primary: #5b8cff;
      --primaryText: #081022;

      --radius: 16px;
      --gap: 12px;

      --inputBg: rgba(255,255,255,.04);
      --inputFocus: rgba(91,140,255,.35);
      --btnRadius: 14px;
      --font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Apple Color Emoji", "Segoe UI Emoji";
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .wrap{
      max-width: 560px;
      margin: 0 auto;
      padding: 18px 14px 24px;
    }

    .header{
      display: block;
      margin-bottom: 14px;
    }

    .title{
      font-size: 20px;
      font-weight: 800;
      letter-spacing: .2px;
      margin: 0;
      line-height: 1.2;
    }

    .subtitle{
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .card{
      background: var(--card);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      border-radius: 16px;
      padding: 14px;
    }

    .grid{
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--gap);
    }

    .field{
      display:flex;
      flex-direction: column;
      gap: 8px;
      min-width: 0;
    }

    .span-2{
      grid-column: 1 / -1;
    }

    label{
      font-size: 12px;
      color: var(--muted);
      letter-spacing: .2px;
      display:flex;
      align-items: center;
      gap: 8px;
      line-height: 1.2;
    }

    .badge{
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.03);
      color: var(--muted);
      white-space: nowrap;
    }

    input, textarea{
      width: 100%;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--inputBg);
      color: var(--text);
      padding: 12px 12px;
      font-size: 15px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }

    input:focus, textarea:focus{
      border-color: rgba(91,140,255,.55);
      box-shadow: 0 0 0 4px var(--inputFocus);
    }

    textarea{
      min-height: 92px;
      resize: vertical;
      line-height: 1.35;
    }

    .row{
      display:flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .btn{
      appearance: none;
      border: 0;
      border-radius: var(--btnRadius);
      padding: 12px 14px;
      font-weight: 800;
      font-size: 15px;
      cursor: pointer;
      transition: transform .06s, filter .15s;
      user-select: none;
    }

    .btn:active{
      transform: translateY(1px);
    }

    .btn-primary{
      background: var(--primary);
      color: var(--primaryText);
      flex: 1;
      min-width: 170px;
    }

    .btn-ghost{
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }

    .hint{
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .msg{
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.03);
      font-size: 13px;
      line-height: 1.35;
      display: none;
    }

    .msg.ok{
      border-color: rgba(43,213,118,.35);
    }

    .msg.err{
      border-color: rgba(255,91,122,.35);
    }

    @media (max-width: 420px){
      .grid{
        grid-template-columns: 1fr 1fr;
      }

      .span-2{
        grid-column: 1 / -1;
      }

      .title{
        font-size: 18px;
      }

      .subtitle{
        font-size: 12px;
      }

      input, textarea{
        font-size: 14px;
        padding: 11px 10px;
      }

      .card{
        padding: 12px;
      }

      .row{
        gap: 8px;
      }

      .btn{
        font-size: 14px;
        padding: 12px 12px;
      }
    }

    body[data-theme="night-card"]{
      --bg: #0f1115;
      --card: #151925;
      --text: #eef2ff;
      --muted: rgba(238,242,255,.70);
      --border: rgba(238,242,255,.10);
      --primary: #5b8cff;
      --primaryText: #071025;
      --inputBg: rgba(255,255,255,.04);
      --inputFocus: rgba(91,140,255,.30);
      --shadow: 0 10px 30px rgba(0,0,0,.35);
    }

    body[data-theme="light-clean"]{
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #0d1220;
      --muted: rgba(13,18,32,.68);
      --border: rgba(13,18,32,.10);
      --primary: #2e6bff;
      --primaryText: #ffffff;
      --inputBg: #f3f5ff;
      --inputFocus: rgba(46,107,255,.22);
      --shadow: 0 10px 24px rgba(13,18,32,.08);
    }

    body[data-theme="soft-green"]{
      --bg: #0f1412;
      --card: #121b16;
      --text: #ebfff5;
      --muted: rgba(235,255,245,.72);
      --border: rgba(235,255,245,.10);
      --primary: #34d399;
      --primaryText: #06130e;
      --inputBg: rgba(255,255,255,.04);
      --inputFocus: rgba(52,211,153,.22);
      --shadow: 0 10px 30px rgba(0,0,0,.35);
    }
  </style>
</head>

<body data-theme="night-card">
  <div class="wrap">
    <div class="header">
      <div>
        <h1 class="title">Трекер ваги та обʼємів</h1>
        <p class="subtitle">Запиши заміри — я збережу їх для відслідковування прогресу.</p>
      </div>
    </div>

    <div class="card">
      <form id="form">
        <div class="grid">
          <div class="field span-2">
            <label for="date">Дата</label>
            <input id="date" name="date" type="date" required />
          </div>

          <div class="field span-2">
            <label for="weight">Вага (кг) <span class="badge">обовʼязково</span></label>
            <input id="weight" name="weight_kg" type="number" inputmode="decimal" step="0.1" min="20" max="300" placeholder="Напр. 82.4" required />
          </div>

          <div class="field">
            <label for="waist">Талія (см)</label>
            <input id="waist" name="waist_cm" type="number" inputmode="decimal" step="0.1" min="30" max="200" placeholder="Напр. 92" />
          </div>

          <div class="field">
            <label for="hips">Стегна (см)</label>
            <input id="hips" name="hips_cm" type="number" inputmode="decimal" step="0.1" min="30" max="250" placeholder="Напр. 104" />
          </div>

          <div class="field">
            <label for="chest">Груди (см)</label>
            <input id="chest" name="chest_cm" type="number" inputmode="decimal" step="0.1" min="30" max="200" placeholder="Напр. 101" />
          </div>

          <div class="field">
            <label for="bodyFat">Жир (%)</label>
            <input id="bodyFat" name="body_fat_pct" type="number" inputmode="decimal" step="0.1" min="3" max="70" placeholder="Напр. 22.5" />
          </div>

          <div class="field">
            <label for="neck">Шия (см)</label>
            <input id="neck" name="neck_cm" type="number" inputmode="decimal" step="0.1" min="20" max="80" placeholder="Напр. 38" />
          </div>

          <div class="field">
            <label for="shoulders">Плечі (см)</label>
            <input id="shoulders" name="shoulders_cm" type="number" inputmode="decimal" step="0.1" min="60" max="200" placeholder="Напр. 118" />
          </div>

          <div class="field">
            <label for="biceps">Біцепс (см)</label>
            <input id="biceps" name="biceps_cm" type="number" inputmode="decimal" step="0.1" min="15" max="80" placeholder="Напр. 34" />
          </div>

          <div class="field">
            <label for="forearm">Передпліччя (см)</label>
            <input id="forearm" name="forearm_cm" type="number" inputmode="decimal" step="0.1" min="15" max="70" placeholder="Напр. 28" />
          </div>

          <div class="field">
            <label for="thigh">Стегно (см)</label>
            <input id="thigh" name="thigh_cm" type="number" inputmode="decimal" step="0.1" min="25" max="120" placeholder="Напр. 60" />
          </div>

          <div class="field">
            <label for="calf">Гомілка (см)</label>
            <input id="calf" name="calf_cm" type="number" inputmode="decimal" step="0.1" min="20" max="80" placeholder="Напр. 38" />
          </div>

          <div class="field span-2">
            <label for="note">Примітка</label>
            <textarea id="note" name="note" maxlength="250" placeholder="Напр.: ввечері після тренування, набряк, мало води..."></textarea>
          </div>
        </div>

        <div class="row">
          <button class="btn btn-primary" id="saveBtn" type="submit">Зберегти</button>
          <button class="btn btn-ghost" id="closeBtn" type="button">Закрити</button>
        </div>

        <div class="hint">
          Порада: вагу краще фіксувати вранці після туалету, до їжі. Обʼєми — в одному й тому ж місці стрічкою.
        </div>

        <div class="msg" id="msg"></div>
      </form>
    </div>
  </div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <script>
    const WEBHOOK_URL = "https://YOUR_WEBHOOK_DOMAIN/weight-tracker";

    const qs = new URLSearchParams(location.search);
    const theme = qs.get("theme");
    if (theme) document.body.setAttribute("data-theme", theme);

    const dateEl = document.getElementById("date");
    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, "0");
    const dd = String(today.getDate()).padStart(2, "0");
    dateEl.value = `${yyyy}-${mm}-${dd}`;

    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
    }

    const form = document.getElementById("form");
    const msg = document.getElementById("msg");
    const saveBtn = document.getElementById("saveBtn");
    const closeBtn = document.getElementById("closeBtn");

    function showMessage(text, type) {
      msg.textContent = text;
      msg.className = "msg " + (type === "ok" ? "ok" : "err");
      msg.style.display = "block";
    }

    function toNumOrNull(v) {
      if (v === "" || v === null || typeof v === "undefined") return null;
      const n = Number(v);
      return Number.isFinite(n) ? n : null;
    }

    function pickOrNull(v) {
      const s = (v || "").toString().trim();
      return s ? s : null;
    }

    closeBtn.addEventListener("click", () => {
      if (tg) tg.close();
      else window.close();
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const weight = toNumOrNull(form.weight_kg.value);
      if (weight === null || weight < 20 || weight > 300) {
        showMessage("Перевір вагу: має бути число 20–300 кг.", "err");
        return;
      }

      saveBtn.disabled = true;
      saveBtn.style.filter = "grayscale(30%) opacity(0.85)";

      const payload = {
        type: "body_checkin_full",
        date: form.date.value,
        weight_kg: weight,

        waist_cm: toNumOrNull(form.waist_cm.value),
        hips_cm: toNumOrNull(form.hips_cm.value),
        chest_cm: toNumOrNull(form.chest_cm.value),
        body_fat_pct: toNumOrNull(form.body_fat_pct.value),

        neck_cm: toNumOrNull(form.neck_cm.value),
        shoulders_cm: toNumOrNull(form.shoulders_cm.value),
        biceps_cm: toNumOrNull(form.biceps_cm.value),
        forearm_cm: toNumOrNull(form.forearm_cm.value),
        thigh_cm: toNumOrNull(form.thigh_cm.value),
        calf_cm: toNumOrNull(form.calf_cm.value),

        note: pickOrNull(form.note.value),

        tz: Intl.DateTimeFormat().resolvedOptions().timeZone || "Europe/Kiev",
        source: "webapp",

        telegram: tg ? {
          initData: tg.initData || null,
          user: tg.initDataUnsafe?.user || null
        } : null
      };

      try {
        const res = await fetch(WEBHOOK_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (!res.ok) {
          const text = await res.text().catch(() => "");
          throw new Error(`HTTP ${res.status} ${text}`.slice(0, 200));
        }

        showMessage("✅ Збережено! Можеш закривати форму.", "ok");
      } catch (err) {
        console.error(err);
        showMessage("❌ Не вдалося зберегти. Перевір інтернет або спробуй ще раз.", "err");
      } finally {
        saveBtn.disabled = false;
        saveBtn.style.filter = "";
      }
    });
  </script>
</body>
</html>
