<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Трекер замірів тіла</title>

  <style>
    :root{
      --bg: #0b1120;
      --card: #121a2e;
      --card-soft: #161f36;
      --text: #eef2ff;
      --muted: rgba(238,242,255,.72);
      --border: rgba(238,242,255,.08);
      --shadow: 0 10px 24px rgba(0,0,0,.28);

      --primary: #5f8dff;
      --primaryText: #091224;

      --inputBg: rgba(255,255,255,.045);
      --inputBorder: rgba(255,255,255,.08);
      --inputFocus: rgba(95,141,255,.18);

      --pinBg: rgba(21,31,54,.86);
      --pinBorder: rgba(95,141,255,.20);
      --pinGlow: rgba(95,141,255,.12);

      --radius: 20px;
      --btnRadius: 14px;
      --font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Apple Color Emoji", "Segoe UI Emoji";
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body{
      margin:0;
      color: var(--text);
      font-family: var(--font);
      background:
        radial-gradient(circle at top, rgba(95,141,255,.12), transparent 28%),
        var(--bg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .wrap{
      max-width: 760px;
      margin: 0 auto;
      padding: 8px 10px 10px;
      height: 100svh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .header{
      margin-bottom: 6px;
      flex: 0 0 auto;
    }

    .title{
      margin:0;
      font-size: 18px;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -.02em;
    }

    .subtitle{
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.25;
    }

    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.015), rgba(255,255,255,.005)), var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 8px;
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    form{
      height: 100%;
      display: flex;
      flex-direction: column;
      min-height: 0;
      gap: 8px;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap: 4px;
      min-width:0;
    }

    label{
      font-size: 11px;
      color: var(--muted);
      display:flex;
      align-items:center;
      gap:6px;
      line-height:1.15;
    }

    .badge{
      font-size:10px;
      padding:2px 8px;
      border-radius:999px;
      border:1px solid var(--border);
      background: rgba(255,255,255,.03);
      color: var(--muted);
      white-space: nowrap;
    }

    input{
      width:100%;
      border-radius: 12px;
      border:1px solid var(--inputBorder);
      background: var(--inputBg);
      color: var(--text);
      padding: 8px 10px;
      font-size: 13px;
      outline:none;
      transition: border-color .15s, box-shadow .15s, background .15s;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.02);
    }

    input::placeholder{
      color: rgba(238,242,255,.38);
    }

    input:focus{
      border-color: rgba(95,141,255,.42);
      box-shadow: 0 0 0 3px var(--inputFocus);
    }

    .top-block,
    .bottom-block{
      flex: 0 0 auto;
    }

    .body-card{
      border: 1px solid var(--border);
      border-radius: 20px;
      background:
        radial-gradient(circle at center, rgba(95,141,255,.05), transparent 54%),
        rgba(255,255,255,.018);
      padding: 6px;
      flex: 1 1 auto;
      min-height: 0;
      overflow: hidden;
    }

    .body-layout{
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 360px;
      border-radius: 16px;
    }

    .body-image-wrap{
      position:absolute;
      left:50%;
      top:43%;
      transform:translate(-50%, -50%);
      width: 175px;
      z-index: 1;
    }

    .body-image{
      width:100%;
      height:auto;
      display:block;
      user-select:none;
      -webkit-user-drag:none;
    }

    .pin{
      position:absolute;
      width: 102px;
      z-index: 2;
    }

    .pin-card{
      background: linear-gradient(180deg, rgba(255,255,255,.016), rgba(255,255,255,.008)), var(--pinBg);
      border: 1px solid var(--pinBorder);
      border-radius: 14px;
      padding: 5px;
      box-shadow:
        0 6px 14px rgba(0,0,0,.16),
        inset 0 1px 0 rgba(255,255,255,.02);
      backdrop-filter: blur(6px);
    }

    .pin.active .pin-card{
      border-color: rgba(95,141,255,.48);
      box-shadow:
        0 0 0 2px var(--pinGlow),
        0 6px 14px rgba(0,0,0,.16);
    }

    .pin-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:4px;
      margin-bottom: 4px;
    }

    .pin-title{
      font-size: 10px;
      color: var(--muted);
      line-height: 1.05;
      padding-top: 1px;
    }

    .pin-input{
      height: 30px;
      padding: 6px 8px;
      font-size: 12px;
      border-radius: 10px;
    }

    .mini-help{
      appearance:none;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.04);
      color: var(--text);
      width: 20px;
      height: 20px;
      border-radius: 999px;
      cursor:pointer;
      font-size: 11px;
      font-weight: 800;
      line-height:1;
      flex: 0 0 auto;
    }

    /* 4 рівні */
    .pin-shoulders{
      top: 4%;
      right: 2%;
    }

    .pin-biceps{
      top: 25%;
      left: 1%;
    }

    .pin-chest{
      top: 25%;
      right: 1%;
    }

    .pin-forearm{
      top: 49%;
      left: 1%;
    }

    .pin-waist{
      top: 49%;
      right: 1%;
    }

    .pin-calf{
      top: 73%;
      left: 1%;
    }

    .pin-hips{
      top: 73%;
      right: 1%;
    }

    .bottom-grid{
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .actions{
      display:flex;
      gap:8px;
      flex-wrap:nowrap;
      flex: 0 0 auto;
    }

    .btn{
      appearance:none;
      border:0;
      border-radius: var(--btnRadius);
      padding: 11px 12px;
      font-weight: 800;
      font-size: 14px;
      cursor:pointer;
      transition: transform .06s, filter .15s, opacity .15s;
      user-select:none;
    }

    .btn:active{
      transform: translateY(1px);
    }

    .btn-primary{
      background: var(--primary);
      color: var(--primaryText);
      flex:1;
      box-shadow: 0 8px 18px rgba(95,141,255,.18);
    }

    .btn-ghost{
      background: transparent;
      color: var(--text);
      border:1px solid var(--border);
      min-width: 110px;
    }

    .hint{
      color: var(--muted);
      font-size: 10px;
      line-height: 1.25;
      flex: 0 0 auto;
    }

    .msg{
      padding: 8px 10px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.03);
      font-size: 12px;
      line-height: 1.3;
      display:none;
      flex: 0 0 auto;
    }

    .msg.ok{ border-color: rgba(43,213,118,.35); }
    .msg.err{ border-color: rgba(255,91,122,.35); }

    .modal{
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      display:none;
      align-items:center;
      justify-content:center;
      padding: 18px;
      z-index: 1000;
    }

    .modal.open{
      display:flex;
    }

    .modal-card{
      width:100%;
      max-width: 380px;
      background: var(--card-soft);
      color: var(--text);
      border:1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 14px;
    }

    .modal-top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin-bottom: 8px;
    }

    .modal-title{
      font-size: 16px;
      font-weight: 800;
      line-height: 1.2;
      margin:0;
    }

    .modal-close{
      appearance:none;
      width:30px;
      height:30px;
      border-radius:999px;
      border:1px solid var(--border);
      background: rgba(255,255,255,.04);
      color: var(--text);
      cursor:pointer;
      font-size:18px;
      line-height:1;
      flex: 0 0 auto;
    }

    .modal-text{
      color: var(--muted);
      font-size: 13px;
      line-height: 1.42;
      white-space: pre-line;
    }

    @media (min-width: 700px){
      .body-image-wrap{
        width: 140px;
      }

      .pin{
        width: 118px;
      }

      .pin-shoulders{ top: 5%; right: 6%; }
      .pin-biceps{ top: 24%; left: 5%; }
      .pin-chest{ top: 24%; right: 5%; }
      .pin-forearm{ top: 48%; left: 5%; }
      .pin-waist{ top: 48%; right: 5%; }
      .pin-calf{ top: 72%; left: 5%; }
      .pin-hips{ top: 72%; right: 5%; }
    }

    body[data-theme="light-clean"]{
      --bg: #f6f7fb;
      --card: #ffffff;
      --card-soft: #ffffff;
      --text: #0d1220;
      --muted: rgba(13,18,32,.68);
      --border: rgba(13,18,32,.10);
      --primary: #2e6bff;
      --primaryText: #ffffff;
      --inputBg: #f3f5ff;
      --inputBorder: rgba(13,18,32,.08);
      --inputFocus: rgba(46,107,255,.18);
      --pinBg: rgba(255,255,255,.95);
      --pinBorder: rgba(46,107,255,.20);
      --pinGlow: rgba(46,107,255,.10);
      --shadow: 0 10px 24px rgba(13,18,32,.08);
    }

    body[data-theme="soft-green"]{
      --bg: #0f1412;
      --card: #121b16;
      --card-soft: #121b16;
      --text: #ebfff5;
      --muted: rgba(235,255,245,.72);
      --border: rgba(235,255,245,.10);
      --primary: #34d399;
      --primaryText: #06130e;
      --inputBg: rgba(255,255,255,.04);
      --inputBorder: rgba(235,255,245,.10);
      --inputFocus: rgba(52,211,153,.16);
      --pinBg: rgba(16,28,22,.90);
      --pinBorder: rgba(52,211,153,.24);
      --pinGlow: rgba(52,211,153,.10);
      --shadow: 0 10px 30px rgba(0,0,0,.35);
    }
  </style>
</head>

<body data-theme="night-card">
  <div class="wrap">
    <div class="header">
      <h1 class="title">Трекер замірів тіла</h1>
      <p class="subtitle">Заповни заміри біля відповідних зон. Натисни на i, якщо потрібна підказка.</p>
    </div>

    <div class="card">
      <form id="form">
        <div class="top-block">
          <div class="field">
            <label for="date">Дата</label>
            <input id="date" name="date" type="date" required />
          </div>
        </div>

        <div class="body-card">
          <div class="body-layout">
            <div class="body-image-wrap">
              <img id="bodyImage" class="body-image" src="./images/MAN.png" alt="Силует тіла" />
            </div>

            <div class="pin pin-shoulders" data-part="shoulders">
              <div class="pin-card">
                <div class="pin-head">
                  <div class="pin-title">Плечі (см)</div>
                  <button class="mini-help" type="button" data-help="shoulders">i</button>
                </div>
                <input class="pin-input" name="shoulders_cm" type="number" step="0.1" inputmode="decimal" placeholder="118" />
              </div>
            </div>

            <div class="pin pin-biceps" data-part="biceps">
              <div class="pin-card">
                <div class="pin-head">
                  <div class="pin-title">Біцепс (см)</div>
                  <button class="mini-help" type="button" data-help="biceps">i</button>
                </div>
                <input class="pin-input" name="biceps_cm" type="number" step="0.1" inputmode="decimal" placeholder="34" />
              </div>
            </div>

            <div class="pin pin-chest" data-part="chest">
              <div class="pin-card">
                <div class="pin-head">
                  <div class="pin-title">Груди (см)</div>
                  <button class="mini-help" type="button" data-help="chest">i</button>
                </div>
                <input class="pin-input" name="chest_cm" type="number" step="0.1" inputmode="decimal" placeholder="101" />
              </div>
            </div>

            <div class="pin pin-forearm" data-part="forearm">
              <div class="pin-card">
                <div class="pin-head">
                  <div class="pin-title">Передпліччя (см)</div>
                  <button class="mini-help" type="button" data-help="forearm">i</button>
                </div>
                <input class="pin-input" name="forearm_cm" type="number" step="0.1" inputmode="decimal" placeholder="28" />
              </div>
            </div>

            <div class="pin pin-waist" data-part="waist">
              <div class="pin-card">
                <div class="pin-head">
                  <div class="pin-title">Талія (см)</div>
                  <button class="mini-help" type="button" data-help="waist">i</button>
                </div>
                <input class="pin-input" name="waist_cm" type="number" step="0.1" inputmode="decimal" placeholder="92" />
              </div>
            </div>

            <div class="pin pin-calf" data-part="calf">
              <div class="pin-card">
                <div class="pin-head">
                  <div class="pin-title">Гомілка (см)</div>
                  <button class="mini-help" type="button" data-help="calf">i</button>
                </div>
                <input class="pin-input" name="calf_cm" type="number" step="0.1" inputmode="decimal" placeholder="38" />
              </div>
            </div>

            <div class="pin pin-hips" data-part="hips">
              <div class="pin-card">
                <div class="pin-head">
                  <div class="pin-title">Стегна (см)</div>
                  <button class="mini-help" type="button" data-help="hips">i</button>
                </div>
                <input class="pin-input" name="hips_cm" type="number" step="0.1" inputmode="decimal" placeholder="104" />
              </div>
            </div>
          </div>
        </div>

        <div class="bottom-grid">
          <div class="field">
            <label for="weight">Вага (кг) <span class="badge">обовʼязково</span></label>
            <input id="weight" name="weight_kg" type="number" inputmode="decimal" step="0.1" min="20" max="300" placeholder="Напр. 82.4" required />
          </div>

          <div class="field">
            <label for="note">Примітка</label>
            <input id="note" name="note" type="text" maxlength="120" placeholder="Напр.: заміри вранці" />
          </div>
        </div>

        <div class="actions">
          <button class="btn btn-primary" id="saveBtn" type="submit">Зберегти</button>
          <button class="btn btn-ghost" id="closeBtn" type="button">Закрити</button>
        </div>

        <div class="hint">
          Порада: міряй у тих самих точках тіла й в однакових умовах.
        </div>

        <div class="msg" id="msg"></div>
      </form>
    </div>
  </div>

  <div class="modal" id="helpModal">
    <div class="modal-card">
      <div class="modal-top">
        <h3 class="modal-title" id="helpTitle">Підказка</h3>
        <button class="modal-close" id="closeHelp" type="button">×</button>
      </div>
      <div class="modal-text" id="helpText"></div>
    </div>
  </div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    const WEBHOOK_URL = "https://YOUR_WEBHOOK_DOMAIN/weight-tracker";

    const BODY_IMAGES = {
      male: "./images/MAN.png",
      female: "./images/WOMAN.png"
    };

    const helpContent = {
      shoulders: {
        title: "Плечі",
        text: "Міряй по найширшій частині плечового поясу. Стрічка має проходити рівно, без перекосу."
      },
      chest: {
        title: "Груди",
        text: "Міряй по найширшій частині грудної клітки. Стрічку тримай горизонтально."
      },
      waist: {
        title: "Талія",
        text: "Міряй найвужчу частину талії або одну стабільну точку трохи вище пупка."
      },
      hips: {
        title: "Стегна",
        text: "Міряй по найширшій частині таза / сідниць. Стрічка має йти паралельно підлозі."
      },
      biceps: {
        title: "Біцепс",
        text: "Міряй руку в найширшій частині плеча. Краще без сильного напруження."
      },
      forearm: {
        title: "Передпліччя",
        text: "Міряй у найширшій частині передпліччя. Руку тримай розслабленою."
      },
      calf: {
        title: "Гомілка",
        text: "Міряй у найширшій частині литки. Вага тіла рівномірно на обидві ноги."
      }
    };

    const qs = new URLSearchParams(location.search);
    const theme = qs.get("theme");
    const gender = (qs.get("gender") || "male").toLowerCase();

    if (theme) document.body.setAttribute("data-theme", theme);

    const dateEl = document.getElementById("date");
    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, "0");
    const dd = String(today.getDate()).padStart(2, "0");
    dateEl.value = `${yyyy}-${mm}-${dd}`;

    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
    }

    const bodyImage = document.getElementById("bodyImage");
    bodyImage.src = BODY_IMAGES[gender] || BODY_IMAGES.male;

    const form = document.getElementById("form");
    const msg = document.getElementById("msg");
    const saveBtn = document.getElementById("saveBtn");
    const closeBtn = document.getElementById("closeBtn");

    const helpModal = document.getElementById("helpModal");
    const helpTitle = document.getElementById("helpTitle");
    const helpText = document.getElementById("helpText");
    const closeHelp = document.getElementById("closeHelp");

    const pins = Array.from(document.querySelectorAll(".pin"));

    function showMessage(text, type) {
      msg.textContent = text;
      msg.className = "msg " + (type === "ok" ? "ok" : "err");
      msg.style.display = "block";
    }

    function toNumOrNull(v) {
      if (v === "" || v === null || typeof v === "undefined") return null;
      const n = Number(v);
      return Number.isFinite(n) ? n : null;
    }

    function pickOrNull(v) {
      const s = (v || "").toString().trim();
      return s ? s : null;
    }

    function clearActive() {
      pins.forEach(p => p.classList.remove("active"));
    }

    function activatePart(part) {
      clearActive();
      const pin = document.querySelector(`.pin[data-part="${part}"]`);
      if (pin) pin.classList.add("active");
    }

    function openHelp(key) {
      const item = helpContent[key];
      if (!item) return;
      helpTitle.textContent = item.title;
      helpText.textContent = item.text;
      helpModal.classList.add("open");
    }

    function closeHelpModal() {
      helpModal.classList.remove("open");
    }

    pins.forEach(pin => {
      const part = pin.dataset.part;
      const input = pin.querySelector("input");
      input.addEventListener("focus", () => activatePart(part));
      input.addEventListener("click", () => activatePart(part));
    });

    document.querySelectorAll(".mini-help").forEach(btn => {
      btn.addEventListener("click", () => {
        const key = btn.dataset.help;
        activatePart(key);
        openHelp(key);
      });
    });

    closeHelp.addEventListener("click", closeHelpModal);
    helpModal.addEventListener("click", (e) => {
      if (e.target === helpModal) closeHelpModal();
    });

    closeBtn.addEventListener("click", () => {
      if (tg) tg.close();
      else window.close();
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const weight = toNumOrNull(form.weight_kg.value);
      if (weight === null || weight < 20 || weight > 300) {
        showMessage("Перевір вагу: має бути число 20–300 кг.", "err");
        return;
      }

      saveBtn.disabled = true;
      saveBtn.style.filter = "grayscale(30%) opacity(0.85)";

      const payload = {
        type: "body_checkin_visual",
        gender,
        date: form.date.value,
        shoulders_cm: toNumOrNull(form.shoulders_cm.value),
        chest_cm: toNumOrNull(form.chest_cm.value),
        waist_cm: toNumOrNull(form.waist_cm.value),
        hips_cm: toNumOrNull(form.hips_cm.value),
        biceps_cm: toNumOrNull(form.biceps_cm.value),
        forearm_cm: toNumOrNull(form.forearm_cm.value),
        calf_cm: toNumOrNull(form.calf_cm.value),
        weight_kg: weight,
        note: pickOrNull(form.note.value),
        tz: Intl.DateTimeFormat().resolvedOptions().timeZone || "Europe/Kiev",
        source: "webapp",
        telegram: tg ? {
          initData: tg.initData || null,
          user: tg.initDataUnsafe?.user || null
        } : null
      };

      try {
        const res = await fetch(WEBHOOK_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (!res.ok) {
          const text = await res.text().catch(() => "");
          throw new Error(`HTTP ${res.status} ${text}`.slice(0, 200));
        }

        showMessage("✅ Збережено! Можеш закривати форму.", "ok");
      } catch (err) {
        console.error(err);
        showMessage("❌ Не вдалося зберегти. Перевір інтернет або спробуй ще раз.", "err");
      } finally {
        saveBtn.disabled = false;
        saveBtn.style.filter = "";
      }
    });
  </script>
</body>
</html>
